name: Build git-2.51.0

on:
  push:
    branches:
      - main
    paths:
      - 'Dockerfile.git-2.51.0'
      - 'Dockerfile.musl-cross-make'
      - '.github/workflows/build-git.yml'
  workflow_dispatch:

env:
  MUSL_TARGET: aarch64-linux-musl

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download musl cross toolchain
        run: |
          curl -fSL --retry 3 -o toolchain.tgz \
            "https://github.com/ygao9999/git_stqtic/releases/download/toolchain-v1/toolchain.tgz"

      - name: Build git-2.51.0
        run: |
          make git-2.51.0 GIT_FULL=yes MUSL_TARGET=${{ env.MUSL_TARGET }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: git-2.51.0-static-aarch64
          path: output/aarch64-linux-musl/git-2.51.0.tar.gz
