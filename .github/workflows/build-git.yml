name: Build git-2.33.0

on:
  push:
    branches:
      - main
    paths:
      - 'Dockerfile.git-2.33.0'
      - 'Dockerfile.musl-cross-make'
      - '.github/workflows/build-git.yml'
  workflow_dispatch:

env:
  MUSL_TARGET: aarch64-linux-musl

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache musl cross toolchain
        id: cache-toolchain
        uses: actions/cache@v4
        with:
          path: toolchain.tgz
          key: musl-cross-${{ env.MUSL_TARGET }}-v1

      - name: Download musl cross toolchain
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        run: |
          curl -fSL --retry 3 --retry-delay 10 \
            -o toolchain.tgz \
            "https://more.musl.cc/11/x86_64-linux-musl/${{ env.MUSL_TARGET }}-cross.tgz" || \
          curl -fSL --retry 3 --retry-delay 10 \
            -o toolchain.tgz \
            "https://musl.cc/${{ env.MUSL_TARGET }}-cross.tgz"

      - name: Build git-2.33.0
        run: |
          make git-2.33.0 GIT_FULL=yes MUSL_TARGET=${{ env.MUSL_TARGET }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: git-2.33.0-static-aarch64
          path: output/aarch64-linux-musl/git-2.33.0.tar.gz
