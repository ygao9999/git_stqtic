name: Build git-2.33.0

on:
  push:
    branches:
      - main
    paths:
      - 'Dockerfile.git-2.33.0'
      - '.github/workflows/build-git.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build git-2.33.0
        run: |
          make git-2.33.0 GIT_FULL=yes

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: git-2.33.0-static
          path: output/x86_64-linux-musl/git-2.33.0.tar.gz
